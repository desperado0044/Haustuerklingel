[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM6
monitor_port = COM6

; Geht von einem ESP32-WROOM-32-Modul mit 4MB Flash aus (das übliche "bare" Devkit). min_spiffs.csv
; liefert zwei ~1.9MB-OTA-App-Partitionen + eine ~896KB-SPIFFS-typisierte Partition, die LittleFS
; ebenfalls problemlos mountet (der ESP32-Arduino-Core interessiert sich nur für den Partitions-
; *Typ*, nicht dafür, welcher Dateisystemtreiber sie formatiert). Falls das echte Board mehr Flash
; hat, auf eine Partitionstabelle mit größeren App-Slots wechseln.
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs

lib_deps =
    bodmer/TFT_eSPI
    paulstoffregen/XPT2046_Touchscreen
    bodmer/TJpg_Decoder
    knolleary/PubSubClient
    tzapu/WiFiManager
    ayushsharma82/ElegantOTA
    ESP32Async/AsyncTCP
    ESP32Async/ESPAsyncWebServer

build_flags =
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
    ; TFT_eSPI wird komplett über Build-Flags konfiguriert statt die User_Setup.h der Lib zu
    ; editieren, damit `pio lib update` die Pin-Konfig nicht überschreibt. Pins hier MÜSSEN zu
    ; src/config.h passen.
    ;
    ; USE_HSPI_PORT legt TFT_eSPIs interne SPI-Instanz auf HSPI (SPI2) statt auf das Standard-VSPI
    ; (SPI3) - echte, separate Hardware gegenüber dem Touch-Bus unten, der das globale Arduino-
    ; `SPI`-Objekt in DESSEN Standardkonfiguration (VSPI/SPI3, native Pins 18/19/23) nutzt.
    ; XPT2046_Touchscreen verwendet intern fest das globale `SPI`-Objekt (keine Möglichkeit, eine
    ; eigene SPIClass zu übergeben) - dieser HSPI/VSPI-Split ist es, der tatsächlich die im
    ; Lastenheft geforderten "getrennten SPI-Busse" liefert.
    ; TFT_MISO bleibt unbelegt (-1/ungenutzt): Wir lesen nie vom Display zurück, und GPIO12
    ; (HSPI's nativer MISO, ein ESP32-Strapping-Pin) unbeschaltet zu lassen vermeidet jedes
    ; Boot-Mode-Risiko dadurch.
    ; TFT_MOSI=4 ist NICHT HSPI's nativer MOSI-Pin (das wäre GPIO13, am realen Board aber nicht
    ; verbunden) - läuft daher über die GPIO-Matrix statt direkt am SPI2-Peripherie-Pin. Für ein
    ; rein statisches Display praktisch kein Unterschied (nur Ausgangssignal, kein Timing-
    ; kritischer Eingang); SPI_FREQUENCY bei Bildfehlern ggf. reduzieren.
    -DUSER_SETUP_LOADED=1
    -DUSE_HSPI_PORT=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=4
    -DTFT_SCLK=14
    -DTFT_CS=17
    -DTFT_DC=21
    -DTFT_RST=16
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000

[env:esp32dev_ota]
extends = env:esp32dev
extra_scripts = platformio_upload.py
upload_protocol = custom
custom_upload_url = http://192.168.1.153/update
custom_username = Haustuerklingel
custom_password = 1234567890
